notes: "Vertical descent level. Player enters at top (y=20000) and must descend to exit at bottom (y=500). Three intermediate checkpoints break the ~20000-micro-unit drop into four sections. Side walls are spike-tagged in the middle bands to punish lateral overshoot during dashes. Bottom-center carries a lava strip; final approach to exit is to the right. Ember pickups distributed to allow 1–2 dashes per section. Tier 3: 5–15 deaths is the acceptable band; first-clear should take ~3.5 minutes for a skilled player."
