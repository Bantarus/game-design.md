name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test suite
        run: pytest
      - name: Lint every in-repo tree
        run: |
          for tree in examples/deckbuilder examples/tick-combat examples/party-rpg examples/tcg \
                      benchmark/games/platformer benchmark/games/survival; do
            echo "== gdmd lint $tree =="
            gdmd lint "$tree"
          done
      - name: Docs-consistency lint
        run: python scripts/docs_lint.py
